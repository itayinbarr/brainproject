<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- Primary SEO -->
  <title>Brain Project - The Most Detailed Interactive 3D Brain</title>
  <meta name="description" content="The most detailed interactive 3D brain available to date - and it keeps growing. Spin, search and peel it apart in your browser: cortex, deep grey nuclei, white-matter tracts, ventricles, brainstem, cerebellum, the circle of Willis, dural sinuses and cranial nerves, each labelled with its anatomical path. Free and open, built to make neuroanatomy easy to learn and explore." />
  <meta name="keywords" content="3D brain, brain project, most detailed 3D brain, brain anatomy, interactive brain model, neuroanatomy, neuroscience, brain map, white matter tracts, cortex, gyri, sulci, basal ganglia, thalamus, ventricles, circle of Willis, cranial nerves, brainstem, cerebellum, learn neuroanatomy" />
  <meta name="author" content="Itay Inbar" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#0c1018" />
  <link rel="canonical" href="https://itayinbarr.github.io/brainproject/" />

  <!-- Open Graph (Facebook, LinkedIn, Slack, …) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Brain Project" />
  <meta property="og:title" content="Brain Project - The Most Detailed Interactive 3D Brain" />
  <meta property="og:description" content="The most detailed interactive 3D brain available to date, and constantly growing. Spin, search and peel it apart in your browser - the granularity neuroscientists and students actually need. Free and open." />
  <meta property="og:url" content="https://itayinbarr.github.io/brainproject/" />
  <meta property="og:image" content="https://itayinbarr.github.io/brainproject/og-image.png" />

  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="The Brain Project interactive 3D brain on its deep-blue stage, alongside the control panel." />

  <meta name="twitter:title" content="Brain Project - The Most Detailed Interactive 3D Brain" />

  <link rel="apple-touch-icon" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />

  <link rel="preconnect" href="https://unpkg.com" crossorigin />

  <!-- Structured data: helps search engines understand what this is -->
  <script type="application/ld+json">

    "name": "Brain Project",
    "url": "https://itayinbarr.github.io/brainproject/",

</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

  <script src="systems-data.js"></script>
