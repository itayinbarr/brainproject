name: Deploy to GitHub Pages

# Publishes the brain-atlas/ app to GitHub Pages on every push to main.
# The app is fully static (JSX is transpiled in-browser via Babel), so there
# is no build step — we just upload the folder as the Pages site root.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload brain-atlas as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: brain-atlas

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
